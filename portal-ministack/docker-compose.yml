version: "3.8"

services:
    localstack:
        container_name: ministack_emulator
        image: localstack/localstack:3.4.0
        ports:
            - "4566:4566"
            - "4510-4559:4510-4559"
        environment:
            - DEBUG=1
            - DOCKER_HOST=unix:///var/run/docker.sock
        volumes:
            - "${LOCALSTACK_VOLUME_DIR:-./localstack-data}:/var/lib/localstack"
            - "/var/run/docker.sock:/var/run/docker.sock"
